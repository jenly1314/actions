name: Security Scan

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '18'
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: ''
      python-version:
        description: 'Python version to use'
        required: false
        type: string
        default: ''
      working-directory:
        description: 'Working directory for scanning'
        required: false
        type: string
        default: '.'
      enable-codeql:
        description: 'Enable CodeQL analysis'
        required: false
        type: boolean
        default: true
      enable-dependency-review:
        description: 'Enable dependency review'
        required: false
        type: boolean
        default: true
      codeql-languages:
        description: 'Languages for CodeQL analysis (JSON array format: ["javascript", "python"])'
        required: false
        type: string
        default: '["javascript"]'

jobs:
  codeql:
    if: inputs.enable-codeql
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(inputs.codeql-languages) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Setup Node.js
        if: inputs.node-version != '' && contains(matrix.language, 'javascript')
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Setup Java
        if: inputs.java-version != '' && contains(matrix.language, 'java')
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}

      - name: Setup Python
        if: inputs.python-version != '' && contains(matrix.language, 'python')
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  dependency-review:
    if: inputs.enable-dependency-review && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
