name: Reusable Stale

on:
  workflow_call:
    inputs:
      days-before-stale:
        description: 'Days until an inactive issue/PR is marked stale.'
        required: false
        type: number
        default: 30
      days-before-close:
        description: 'Days after being stale before closing.'
        required: false
        type: number
        default: 5
      exempt-labels:
        description: 'Labels that exempt issues/PRs from being marked stale.'
        required: false
        type: string
        default: 'help wanted'

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: ${{ inputs.days-before-stale }}
          days-before-close: ${{ inputs.days-before-close }}
          exempt-issue-labels: ${{ inputs.exempt-labels }}
          exempt-pr-labels: ${{ inputs.exempt-labels }}
          exempt-all-pr-milestones: true
          stale-issue-message: |
            This issue is stale because it has been open ${{ inputs.days-before-stale }} days with no activity.
            Remove stale label or comment or this will be closed in ${{ inputs.days-before-close }} days.
