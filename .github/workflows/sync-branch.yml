name: Sync Branch

on:
  workflow_dispatch:
    inputs:
      branch-name:
        description: 'Branch to sync (e.g., v1)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sync Branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B ${{ inputs.branch-name }}
          git push origin ${{ inputs.branch-name }}
          echo "Branch ${{ inputs.branch-name }} synced."
