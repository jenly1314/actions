name: Reusable Publish

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version (takes precedence over java-version-file)'
        required: false
        type: string
      java-version-file:
        description: 'Path to the .java-version or .sdkmanrc file.'
        required: true
        type: string
      gradle-command:
        description: 'Full Gradle command for publishing. Default is for Maven Central.'
        required: false
        type: string
        default: './gradlew clean publishAndReleaseToMavenCentral -PRELEASE_SIGNING_ENABLED=true --stacktrace'
    secrets:
      maven-username:
        required: true
      maven-password:
        required: true
      gpg-secret-key:
        required: true
      gpg-secret-passphrase:
        required: true

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: ${{ inputs.java-version }}
          java-version-file: ${{ inputs.java-version-file }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run Gradle Publish
        run: ${{ inputs.gradle-command }}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.maven-username }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.maven-password }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.gpg-secret-key }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.gpg-secret-passphrase }}