name: Release

on:
  workflow_dispatch:
    inputs:
      tag-name:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true
        type: string
      branch-name:
        description: 'Branch to sync (e.g., v1)'
        required: true
        type: string
      release-notes:
        description: 'Release notes (optional)'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync Branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B ${{ inputs.branch-name }} ${{ inputs.tag-name }}
          git push origin ${{ inputs.branch-name }}

      - name: Create Release
        run: |
          gh release create ${{ inputs.tag-name }} \
            --title "${{ inputs.tag-name }}" \
            --notes "${{ inputs.release-notes }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}