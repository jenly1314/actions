name: Release

on:
  workflow_dispatch:
    inputs:
      branch-name:
        description: 'Branch to sync (e.g., v1)'
        required: true
        type: string
      tag-name:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true
        type: string
      release-notes:
        description: 'Release notes (optional)'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sync Branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B ${{ inputs.branch-name }}
          git push origin ${{ inputs.branch-name }}
          echo "Branch ${{ inputs.branch-name }} synced."

      - name: Create Release
        run: |
          RAW_NOTES='${{ inputs.release-notes }}'
          NOTES=$(echo "$RAW_NOTES" | sed 's/ - /\n- /g; s/ \* /\n* /g')
          gh release create ${{ inputs.tag-name }} \
            --title "${{ inputs.tag-name }}" \
            --notes "$NOTES"
          echo "Release ${{ inputs.tag-name }} created."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
